<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI REF-TRADERS - Games</title>
    <style>
        /* [Previous CSS styles remain exactly the same] */
    </style>
</head>
<body>
    <!-- [Previous HTML structure remains exactly the same] -->

    <script>
        // ===== SESSION TIMEOUT MANAGEMENT =====
        let sessionTimeout;
        const GAME_SESSION_DURATION = 60 * 60 * 1000; // 60 minutes in milliseconds

        function startSessionTimer() {
            // Clear any existing timeout
            if (sessionTimeout) {
                clearTimeout(sessionTimeout);
            }
            
            // Set new timeout
            sessionTimeout = setTimeout(() => {
                // Force user back to ads page
                if (window.location.pathname.includes('game.html')) {
                    window.location.href = 'ads.html';
                }
            }, GAME_SESSION_DURATION);
            
            // Store the session start time
            localStorage.setItem('gameSessionStart', Date.now());
        }

        function checkSessionTime() {
            const sessionStart = localStorage.getItem('gameSessionStart');
            if (sessionStart) {
                const timeLeft = GAME_SESSION_DURATION - (Date.now() - parseInt(sessionStart));
                if (timeLeft <= 0) {
                    window.location.href = 'ads.html';
                }
            }
        }

        // ===== DATA MANAGEMENT =====
        // [Previous data management functions remain the same]

        // ===== GAME IMPLEMENTATIONS =====
        const memoryGame = {
            fruits: ['🍎', '🍌', '🍒', '🍓', '🍊', '🍋', '🍐', '🍇'],
            values: [],
            flippedCards: [],
            matchedPairs: 0,
            canPlay: false,
            gameActive: false,
            
            init: function() {
                this.gameActive = true;
                document.getElementById('gameBoard').innerHTML = '';
                this.matchedPairs = 0;
                this.flippedCards = [];
                
                this.values = [];
                this.fruits.forEach(fruit => {
                    this.values.push(fruit, fruit);
                });
                
                const shuffled = [...this.values].sort(() => 0.5 - Math.random());
                
                shuffled.forEach((value, index) => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.dataset.value = value;
                    card.dataset.index = index;
                    card.textContent = '?';
                    card.style.fontSize = '30px';
                    
                    card.addEventListener('click', () => {
                        if (this.canPlay && this.gameActive && gameData.memory.attempts > 0 && 
                            !card.classList.contains('flipped') && !card.classList.contains('matched') && 
                            this.flippedCards.length < 2) {
                            this.flipCard(card);
                        }
                    });
                    
                    document.getElementById('gameBoard').appendChild(card);
                });
                
                // Show all cards briefly
                const cards = document.querySelectorAll('.card');
                cards.forEach(card => {
                    card.classList.add('flipped');
                    card.textContent = card.dataset.value;
                });
                
                // Hide cards after 3 seconds
                setTimeout(() => {
                    cards.forEach(card => {
                        card.classList.remove('flipped');
                        card.textContent = '?';
                    });
                    this.canPlay = true;
                }, 3000);
            },
            
            flipCard: function(card) {
                if (!this.gameActive) return;
                
                document.getElementById('flipSound').currentTime = 0;
                document.getElementById('flipSound').play();
                
                card.classList.add('flipped');
                card.textContent = card.dataset.value;
                this.flippedCards.push(card);
                
                if (this.flippedCards.length === 2) {
                    this.canPlay = false;
                    setTimeout(() => this.checkMatch(), 500);
                }
            },
            
            checkMatch: function() {
                if (!this.gameActive) return;
                
                const [card1, card2] = this.flippedCards;
                
                gameData.memory.attempts--;
                saveGameData();
                updateUI();
                
                if (card1.dataset.value === card2.dataset.value) {
                    // Match found
                    card1.classList.add('matched');
                    card2.classList.add('matched');
                    this.matchedPairs++;
                    
                    gameData.memory.wins++;
                    gameData.memory.earnings += 800;
                    addGameEarnings(800);
                    document.getElementById('winSound').currentTime = 0;
                    document.getElementById('winSound').play();
                    
                    // Immediate UI update
                    document.getElementById('wins').textContent = gameData.memory.wins;
                    document.getElementById('gameEarnings').textContent = gameData.memory.earnings;
                    
                    if (this.matchedPairs === 8) {
                        showNotification('🎉 You won ₦6,400!');
                        setTimeout(() => {
                            this.matchedPairs = 0;
                            this.init();
                        }, 2000);
                    }
                } else {
                    // No match
                    setTimeout(() => {
                        card1.classList.remove('flipped');
                        card2.classList.remove('flipped');
                        card1.textContent = '?';
                        card2.textContent = '?';
                        document.getElementById('loseSound').currentTime = 0;
                        document.getElementById('loseSound').play();
                    }, 500);
                }
                
                this.flippedCards = [];
                this.canPlay = true;
                
                if (gameData.memory.attempts <= 0) {
                    this.gameActive = false;
                    showNotification('Memory game attempts exhausted.');
                }
            }
        };

        // [Rest of the game implementations remain the same]

        // ===== NAVIGATION FUNCTIONS =====
        function navigateToDashboard() {
            window.location.href = 'index.html';
        }

        // ===== INITIALIZATION =====
        document.addEventListener('DOMContentLoaded', () => {
            // Check session time immediately
            checkSessionTime();
            
            // Start new session timer
            startSessionTimer();
            
            // Set up periodic session check (every minute)
            setInterval(checkSessionTime, 60000);
            
            // Load data
            loadGameData();
            updateUI();
            
            // Initialize games
            memoryGame.init();
            diceGame.init();
            snakeGame.init();
            triviaGame.init();
            wheelGame.init();
            
            // Game card click handlers
            document.querySelectorAll('.game-card').forEach(card => {
                card.addEventListener('click', () => {
                    showGame(card.dataset.game);
                });
            });
            
            // Back to games buttons
            document.getElementById('backToGames1').addEventListener('click', () => showGame(''));
            document.getElementById('backToGames2').addEventListener('click', () => showGame(''));
            document.getElementById('backToGames3').addEventListener('click', () => showGame(''));
            document.getElementById('backToGames4').addEventListener('click', () => showGame(''));
            document.getElementById('backToGames5').addEventListener('click', () => showGame(''));
            
            // Dashboard navigation button (add this to your HTML if not present)
            const dashboardBtn = document.createElement('button');
            dashboardBtn.className = 'primary';
            dashboardBtn.textContent = '← Dashboard';
            dashboardBtn.style.position = 'fixed';
            dashboardBtn.style.bottom = '20px';
            dashboardBtn.style.left = '20px';
            dashboardBtn.style.zIndex = '100';
            dashboardBtn.addEventListener('click', navigateToDashboard);
            document.body.appendChild(dashboardBtn);
            
            // Listen for messages from main app
            window.addEventListener('message', (event) => {
                if (event.data.type === 'updateBalance') {
                    userData.balance = event.data.balance;
                    updateBalance();
                }
            });
        });
    </script>
</body>
</html>
