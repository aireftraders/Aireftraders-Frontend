<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Ads to Continue</title>
    <style>
        :root {
            --primary: #6C5CE7;
            --primary-dark: #5649c0;
            --success: #00B894;
            --danger: #e74c3c;
            --light: #f8f9fa;
            --dark: #343a40;
            --border-radius: 12px;
            --box-shadow: 0 8px 30px rgba(0,0,0,0.12);
            --transition: all 0.3s ease;
        }
        
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--dark);
            line-height: 1.6;
        }
        
        .ad-container {
            background: white;
            border-radius: var(--border-radius);
            padding: 2.5rem;
            width: 90%;
            max-width: 900px;
            margin: 2rem auto;
            box-shadow: var(--box-shadow);
            text-align: center;
        }
        
        .ad-header {
            margin-bottom: 1.5rem;
        }
        
        .ad-header h2 {
            font-size: 2rem;
            font-weight: 700;
            margin: 0 0 0.5rem;
            color: var(--dark);
            background: linear-gradient(to right, var(--primary), #a55eea);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .ad-header p {
            font-size: 1.1rem;
            color: #6c757d;
            margin: 0;
        }
        
        #adFrameContainer {
            width: 100%;
            min-height: 300px;
            margin: 2rem auto;
            border-radius: var(--border-radius);
            background: var(--light);
            overflow: hidden;
            position: relative;
            border: 1px solid rgba(0,0,0,0.08);
        }
        
        #adFrame {
            width: 100%;
            height: 100%;
            min-height: 300px;
            border: none;
        }
        
        .progress-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            margin: 2rem 0;
            gap: 0.5rem;
        }
        
        .progress-step {
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 50%;
            background: #e9ecef;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            font-weight: 600;
            transition: var(--transition);
            position: relative;
        }
        
        .progress-step.active {
            background: var(--primary);
            color: white;
            transform: scale(1.1);
            box-shadow: 0 0 0 4px rgba(108, 92, 231, 0.2);
        }
        
        .progress-step.completed {
            background: var(--success);
            color: white;
        }
        
        .progress-step.completed::after {
            content: '✓';
            position: absolute;
        }
        
        #timerDisplay {
            margin: 1.5rem 0;
            font-weight: 600;
            font-size: 1.2rem;
            color: #495057;
        }
        
        #timerCount {
            font-weight: 700;
            color: var(--primary);
        }
        
        .watch-ad-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3);
        }
        
        .watch-ad-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(108, 92, 231, 0.4);
        }
        
        .watch-ad-btn:active {
            transform: translateY(0);
        }
        
        .ad-status {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin: 1rem 0;
            font-size: 0.9rem;
            color: #6c757d;
        }
        
        .access-denied {
            margin: 2rem 0;
            padding: 1.5rem;
            background: rgba(231, 76, 60, 0.1);
            border-radius: var(--border-radius);
            border-left: 4px solid var(--danger);
        }
        
        .access-denied h3 {
            color: var(--danger);
            margin-top: 0;
            font-size: 1.3rem;
        }
        
        .time-remaining {
            font-size: 1rem;
            font-weight: 600;
            color: var(--dark);
        }
        
        .time-remaining span {
            color: var(--primary);
            font-weight: 700;
        }
        
        @media (max-width: 768px) {
            .ad-container {
                padding: 1.5rem;
                width: 95%;
            }
            
            .ad-header h2 {
                font-size: 1.5rem;
            }
            
            .ad-header p {
                font-size: 1rem;
            }
            
            #adFrameContainer, #adFrame {
                min-height: 250px;
            }
            
            .progress-step {
                width: 2rem;
                height: 2rem;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="ad-container" id="mainContainer">
        <div class="ad-header">
            <h2>Complete Ads to Continue</h2>
            <p id="adPurpose">Watch ads to unlock access</p>
        </div>
        
        <div class="ad-status">
            <span>Progress: <span id="completedCount">0</span>/20</span>
            <span>Estimated time: <span id="estimatedTime">5 minutes</span></span>
        </div>
        
        <div class="progress-container" id="progressSteps"></div>
        
        <div id="adFrameContainer">
            <!-- Ad will be loaded here -->
        </div>
        
        <div id="timerDisplay">Ad completes in <span id="timerCount">15</span> seconds</div>
        
        <button class="watch-ad-btn" id="watchAdBtn">Watch Ad</button>
    </div>

    <script>
        // Configuration
        const totalAds = 20;
        const minAdDuration = 15000; // 15 seconds per ad
        const accessCooldown = 60 * 60 * 1000; // 60 minutes in milliseconds
        let currentAdCount = 0;
        let timer = null;
        let adStartTime = 0;
        let canCountAd = false;
        let accessDenied = false;
        let cooldownInterval = null;
        let redirectTo = 'game.html'; // Default fallback

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            // Check if we should block access first
            checkAccessStatus();
            
            // Only setup page if access is not denied
            if (!accessDenied) {
                setupPage();
            }
        });

        function checkAccessStatus() {
            // Get ads data from the same storage system as index.html
            const adsData = JSON.parse(localStorage.getItem('adsData')) || {
                adsWatched: 0,
                lastAdWatchTime: null,
                adsRequired: 20
            };
            
            // Check if access is on cooldown
            if (adsData.lastAdWatchTime && 
                (Date.now() - adsData.lastAdWatchTime) < accessCooldown && 
                adsData.adsWatched >= totalAds) {
                accessDenied = true;
                showAccessDenied(adsData.lastAdWatchTime + accessCooldown, adsData.lastRedirect || redirectTo);
                return true;
            }
            
            return false;
        }

        function showAccessDenied(expiryTime, redirectUrl) {
            const mainContainer = document.getElementById('mainContainer');
            mainContainer.innerHTML = `
                <div class="ad-header">
                    <h2>Ads Limit Reached</h2>
                    <p>You've completed your daily ads</p>
                </div>
                
                <div class="access-denied">
                    <h3>Access Temporarily Unavailable</h3>
                    <p>You've watched 20 ads. Please try again later.</p>
                    <div class="time-remaining">Time remaining: <span id="cooldownTimer"></span></div>
                </div>
                
                <button class="watch-ad-btn" id="returnBtn">Return to Previous Page</button>
            `;
            
            // Start cooldown timer
            updateCooldownTimer(expiryTime);
            cooldownInterval = setInterval(() => updateCooldownTimer(expiryTime), 1000);
            
            // Setup return button
            document.getElementById('returnBtn').addEventListener('click', () => {
                clearInterval(cooldownInterval);
                window.location.href = redirectUrl;
            });
        }

        function updateCooldownTimer(expiryTime) {
            const remaining = expiryTime - Date.now();
            if (remaining <= 0) {
                clearInterval(cooldownInterval);
                window.location.reload();
                return;
            }
            
            const minutes = Math.floor(remaining / (1000 * 60));
            const seconds = Math.floor((remaining % (1000 * 60)) / 1000);
            
            document.getElementById('cooldownTimer').textContent = 
                `${minutes}m ${seconds}s`;
        }

        function setupPage() {
            // Get the referring page from URL parameter or localStorage
            const urlParams = new URLSearchParams(window.location.search);
            const source = urlParams.get('source');
            
            if (source === 'game' || source === 'trading') {
                redirectTo = source + '.html';
                localStorage.setItem('postAdRedirect', redirectTo);
            } else {
                // Fallback to checking localStorage or referrer
                const storedRedirect = localStorage.getItem('postAdRedirect');
                if (storedRedirect) {
                    redirectTo = storedRedirect;
                } else if (document.referrer.includes('game.html')) {
                    redirectTo = 'game.html';
                } else if (document.referrer.includes('trading.html')) {
                    redirectTo = 'trading.html';
                }
                localStorage.setItem('postAdRedirect', redirectTo);
            }

            // Load current progress from the same storage as index.html
            const adsData = JSON.parse(localStorage.getItem('adsData')) || {
                adsWatched: 0,
                lastAdWatchTime: null,
                adsRequired: 20
            };
            
            // Ensure we don't exceed the limit
            currentAdCount = Math.min(adsData.adsWatched, totalAds);
            
            // Immediately redirect if already completed
            if (currentAdCount >= totalAds && !accessDenied) {
                grantAccessAndRedirect();
                return;
            }
            
            updateProgressDisplay();
            
            // Load first ad
            loadAd();
            
            // Setup button handler
            document.getElementById('watchAdBtn').addEventListener('click', handleAdWatch);
        }

        function updateProgressDisplay() {
            const remaining = Math.max(0, totalAds - currentAdCount);
            const estimatedMinutes = Math.ceil((remaining * minAdDuration) / 60000);
            
            document.getElementById('adPurpose').textContent = 
                remaining > 0 ? `Watch ${remaining} more ads to continue` : 'All ads completed!';
            document.getElementById('completedCount').textContent = currentAdCount;
            document.getElementById('estimatedTime').textContent = 
                estimatedMinutes > 1 ? `${estimatedMinutes} minutes` : 'less than a minute';
            
            const container = document.getElementById('progressSteps');
            container.innerHTML = '';
            
            for (let i = 0; i < totalAds; i++) {
                const step = document.createElement('div');
                step.className = 'progress-step';
                step.textContent = i + 1;
                if (i < currentAdCount) {
                    step.classList.add('completed');
                    step.textContent = '';
                }
                if (i === currentAdCount && currentAdCount < totalAds) {
                    step.classList.add('active');
                }
                container.appendChild(step);
            }
        }

        function loadAd() {
            canCountAd = false;
            adStartTime = Date.now();
            
            // Clear previous ad
            const adContainer = document.getElementById('adFrameContainer');
            adContainer.innerHTML = '';
            
            // Load new ad (your Adsterra code)
            const adScript1 = document.createElement('script');
            adScript1.type = 'text/javascript';
            adScript1.innerHTML = `
                atOptions = {
                    'key' : '8a1d6d42d6addf614a0b20c144270316',
                    'format' : 'iframe',
                    'height' : 250,
                    'width' : 300,
                    'params' : {}
                };
            `;

            const adScript2 = document.createElement('script');
            adScript2.type = 'text/javascript';
            adScript2.src = '//innumerablemakeupreligious.com/8a1d6d42d6addf614a0b20c144270316/invoke.js';

            adContainer.appendChild(adScript1);
            adContainer.appendChild(adScript2);
            
            // Start timer
            startTimer();
        }

        function startTimer() {
            let seconds = 15;
            updateTimerDisplay(seconds);
            
            clearInterval(timer);
            timer = setInterval(() => {
                seconds--;
                updateTimerDisplay(seconds);
                
                if (seconds <= 0) {
                    clearInterval(timer);
                    canCountAd = true;
                    document.getElementById('watchAdBtn').textContent = "Continue";
                    document.getElementById('watchAdBtn').style.backgroundColor = 'var(--success)';
                }
            }, 1000);
        }

        function updateTimerDisplay(seconds) {
            document.getElementById('timerCount').textContent = seconds;
            document.getElementById('timerCount').style.color = seconds <= 5 ? 'var(--danger)' : 'var(--primary)';
        }

        function handleAdWatch() {
            if (!canCountAd) {
                const elapsed = Date.now() - adStartTime;
                const remaining = Math.ceil((minAdDuration - elapsed) / 1000);
                alert(`Please watch the ad for ${remaining} more seconds before continuing.`);
                return;
            }
            
            // Count the ad
            currentAdCount++;
            
            // Update ads data in the same format as index.html expects
            const adsData = JSON.parse(localStorage.getItem('adsData')) || {
                adsWatched: 0,
                lastAdWatchTime: null,
                adsRequired: 20
            };
            
            // Update ad data
            adsData.adsWatched = currentAdCount;
            adsData.lastAdWatchTime = Date.now();
            
            // Save to localStorage
            localStorage.setItem('adsData', JSON.stringify(adsData));
            
            // Also update the main user data to ensure sync
            const userData = JSON.parse(localStorage.getItem('userData')) || {};
            if (!userData.adsWatched) {
                userData.adsWatched = 0;
            }
            userData.adsWatched = currentAdCount;
            localStorage.setItem('userData', JSON.stringify(userData));
            
            // Check if completed
            if (currentAdCount >= totalAds) {
                grantAccessAndRedirect();
                return;
            }
            
            // Update display and load next ad
            updateProgressDisplay();
            document.getElementById('watchAdBtn').textContent = "Watch Ad";
            document.getElementById('watchAdBtn').style.backgroundColor = 'var(--primary)';
            loadAd();
        }

        function grantAccessAndRedirect() {
            // Get redirect URL
            const redirectUrl = localStorage.getItem('postAdRedirect') || 'game.html';
            
            // Immediately redirect
            window.location.href = redirectUrl;
        }
    </script>
</body>
</html>
