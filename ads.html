<!DOCTYPE html>
<html>
<head>
    <title>Complete Ads to Continue</title>
    <style>
        /* Your original CSS - completely unchanged */
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #f5f5f5;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .ad-container {
            background: white;
            border-radius: 15px;
            padding: 30px;
            width: 95%;
            max-width: 1200px;
            margin: 0 auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
        #adFrameContainer {
            width: 100%;
            min-height: 600px;
            margin: 30px auto;
            border: 3px solid #e0e0e0;
            background: #f9f9f9;
            overflow: hidden;
            position: relative;
        }
        #adFrame {
            width: 100%;
            height: 100%;
            min-height: 600px;
            border: none;
        }
        .progress-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            margin: 30px 0;
            gap: 10px;
        }
        .progress-step {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 3px 6px rgba(0,0,0,0.1);
        }
        .progress-step.active {
            background: #6C5CE7;
            color: white;
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(108, 92, 231, 0.6);
        }
        .progress-step.completed {
            background: #00B894;
            color: white;
        }
        #timerDisplay {
            margin: 30px 0;
            font-weight: bold;
            font-size: 24px;
        }
        h2 {
            font-size: 32px;
            margin-bottom: 20px;
            color: #333;
        }
        #adPurpose {
            font-size: 20px;
            color: #666;
            margin-bottom: 30px;
        }
        .watch-ad-btn {
            background: #6C5CE7;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
        }
        .watch-ad-btn:hover {
            background: #5649c0;
            transform: translateY(-2px);
        }
        @media (max-width: 768px) {
            .ad-container {
                width: 98%;
                padding: 20px;
            }
            #adFrameContainer, #adFrame {
                min-height: 400px;
            }
            .progress-step {
                width: 38px;
                height: 38px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="ad-container">
        <h2>Watch Ads to Unlock Access</h2>
        <p id="adPurpose">Complete 20 ads to continue.</p>
        
        <div class="progress-container" id="progressSteps"></div>
        
        <div id="adFrameContainer">
            <!-- Ad will be loaded here -->
        </div>
        
        <div id="timerDisplay">Ad will complete in <span id="timerCount">15</span> seconds</div>
        
        <button class="watch-ad-btn" id="watchAdBtn">Watch Ad</button>
    </div>

    <script>
        // Configuration
        const totalAds = 20;
        const minAdDuration = 15000; // 15 seconds per ad
        let currentAdCount = 0;
        let timer = null;
        let adStartTime = 0;
        let canCountAd = false;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            // Load current progress
            const adData = JSON.parse(localStorage.getItem('adAccessData')) || {
                adsWatched: 0,
                accessGranted: false,
                accessExpiry: 0
            };
            currentAdCount = adData.adsWatched;
            updateProgressDisplay();
            
            // Load first ad
            loadAd();
            
            // Setup button handler
            document.getElementById('watchAdBtn').addEventListener('click', handleAdWatch);
        });

        function updateProgressDisplay() {
            document.getElementById('adPurpose').textContent = 
                `Complete ${20 - currentAdCount} more ads to continue. (${currentAdCount}/20 watched)`;
            
            const container = document.getElementById('progressSteps');
            container.innerHTML = '';
            
            for (let i = 0; i < totalAds; i++) {
                const step = document.createElement('div');
                step.className = 'progress-step';
                step.textContent = i + 1;
                if (i < currentAdCount) step.classList.add('completed');
                if (i === currentAdCount) step.classList.add('active');
                container.appendChild(step);
            }
        }

        function loadAd() {
            canCountAd = false;
            adStartTime = Date.now();
            
            // Clear previous ad
            const adContainer = document.getElementById('adFrameContainer');
            adContainer.innerHTML = '';
            
            // Load new ad (your Adsterra code)
            const adScript1 = document.createElement('script');
            adScript1.type = 'text/javascript';
            adScript1.innerHTML = `
                atOptions = {
                    'key' : '8a1d6d42d6addf614a0b20c144270316',
                    'format' : 'iframe',
                    'height' : 250,
                    'width' : 300,
                    'params' : {}
                };
            `;

            const adScript2 = document.createElement('script');
            adScript2.type = 'text/javascript';
            adScript2.src = '//innumerablemakeupreligious.com/8a1d6d42d6addf614a0b20c144270316/invoke.js';

            adContainer.appendChild(adScript1);
            adContainer.appendChild(adScript2);
            
            // Start timer
            startTimer();
        }

        function startTimer() {
            let seconds = 15;
            updateTimerDisplay(seconds);
            
            clearInterval(timer);
            timer = setInterval(() => {
                seconds--;
                updateTimerDisplay(seconds);
                
                if (seconds <= 0) {
                    clearInterval(timer);
                    canCountAd = true;
                    document.getElementById('watchAdBtn').textContent = "Count Ad & Continue";
                }
            }, 1000);
        }

        function updateTimerDisplay(seconds) {
            document.getElementById('timerCount').textContent = seconds;
            document.getElementById('timerCount').style.color = seconds <= 5 ? '#e74c3c' : '';
        }

        function handleAdWatch() {
            if (!canCountAd) {
                const elapsed = Date.now() - adStartTime;
                const remaining = Math.ceil((minAdDuration - elapsed) / 1000);
                alert(`Please wait ${remaining} more seconds before counting this ad.`);
                return;
            }
            
            // Count the ad
            currentAdCount++;
            localStorage.setItem('adAccessData', JSON.stringify({
                adsWatched: currentAdCount,
                accessGranted: false,
                accessExpiry: 0
            }));
            
            // Check if completed
            if (currentAdCount >= totalAds) {
                grantAccessAndRedirect();
                return;
            }
            
            // Update display and load next ad
            updateProgressDisplay();
            document.getElementById('watchAdBtn').textContent = "Watch Ad";
            loadAd();
        }

        function grantAccessAndRedirect() {
            // Grant 60-minute access
            const adData = {
                adsWatched: 20,
                accessGranted: true,
                accessExpiry: Date.now() + (60 * 60 * 1000)
            };
            localStorage.setItem('adAccessData', JSON.stringify(adData));
            
            // Get redirect URL
            const urlParams = new URLSearchParams(window.location.search);
            const redirectUrl = urlParams.get('redirectTo') || 
                              localStorage.getItem('postAdRedirect') || 
                              'index.html#game';
            
            // Clean up and redirect
            localStorage.removeItem('postAdRedirect');
            window.location.href = redirectUrl + '?ads_completed=true';
        }
    </script>
</body>
</html>
