<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Ads to Continue</title>
    <style>
        :root {
            --primary: #6C5CE7;
            --primary-dark: #5649c0;
            --success: #00B894;
            --danger: #e74c3c;
            --light: #f8f9fa;
            --dark: #343a40;
            --border-radius: 12px;
            --box-shadow: 0 8px 30px rgba(0,0,0,0.12);
            --transition: all 0.3s ease;
        }
        
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--dark);
            line-height: 1.6;
        }
        
        .ad-container {
            background: white;
            border-radius: var(--border-radius);
            padding: 2.5rem;
            width: 90%;
            max-width: 900px;
            margin: 2rem auto;
            box-shadow: var(--box-shadow);
            text-align: center;
        }
        
        .ad-header {
            margin-bottom: 1.5rem;
        }
        
        .ad-header h2 {
            font-size: 2rem;
            font-weight: 700;
            margin: 0 0 0.5rem;
            color: var(--dark);
            background: linear-gradient(to right, var(--primary), #a55eea);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .ad-header p {
            font-size: 1.1rem;
            color: #6c757d;
            margin: 0;
        }
        
        #adFrameContainer {
            width: 100%;
            min-height: 300px;
            margin: 2rem auto;
            border-radius: var(--border-radius);
            background: var(--light);
            overflow: hidden;
            position: relative;
            border: 1px solid rgba(0,0,0,0.08);
        }
        
        #adFrame {
            width: 100%;
            height: 100%;
            min-height: 300px;
            border: none;
        }
        
        .progress-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            margin: 2rem 0;
            gap: 0.5rem;
        }
        
        .progress-step {
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 50%;
            background: #e9ecef;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            font-weight: 600;
            transition: var(--transition);
            position: relative;
        }
        
        .progress-step.active {
            background: var(--primary);
            color: white;
            transform: scale(1.1);
            box-shadow: 0 0 0 4px rgba(108, 92, 231, 0.2);
        }
        
        .progress-step.completed {
            background: var(--success);
            color: white;
        }
        
        .progress-step.completed::after {
            content: '✓';
            position: absolute;
        }
        
        #timerDisplay {
            margin: 1.5rem 0;
            font-weight: 600;
            font-size: 1.2rem;
            color: #495057;
        }
        
        #timerCount {
            font-weight: 700;
            color: var(--primary);
        }
        
        .watch-ad-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3);
        }
        
        .watch-ad-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(108, 92, 231, 0.4);
        }
        
        .watch-ad-btn:active {
            transform: translateY(0);
        }
        
        .ad-status {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin: 1rem 0;
            font-size: 0.9rem;
            color: #6c757d;
        }
        
        @media (max-width: 768px) {
            .ad-container {
                padding: 1.5rem;
                width: 95%;
            }
            
            .ad-header h2 {
                font-size: 1.5rem;
            }
            
            .ad-header p {
                font-size: 1rem;
            }
            
            #adFrameContainer, #adFrame {
                min-height: 250px;
            }
            
            .progress-step {
                width: 2rem;
                height: 2rem;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="ad-container">
        <div class="ad-header">
            <h2>Complete Ads to Continue</h2>
            <p id="adPurpose">Watch ads to unlock access</p>
        </div>
        
        <div class="ad-status">
            <span>Progress: <span id="completedCount">0</span>/20</span>
            <span>Estimated time: <span id="estimatedTime">5 minutes</span></span>
        </div>
        
        <div class="progress-container" id="progressSteps"></div>
        
        <div id="adFrameContainer">
            <!-- Ad will be loaded here -->
        </div>
        
        <div id="timerDisplay">Ad completes in <span id="timerCount">15</span> seconds</div>
        
        <button class="watch-ad-btn" id="watchAdBtn">Watch Ad</button>
    </div>

    <script>
        // Configuration
        const totalAds = 20;
        const minAdDuration = 15000; // 15 seconds per ad
        const resetInterval = 60 * 60 * 1000; // 60 minutes in milliseconds
        let currentAdCount = 0;
        let timer = null;
        let adStartTime = 0;
        let canCountAd = false;
        let redirectTo = 'game.html'; // Default fallback

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            // Get the referring page from URL parameter or localStorage
            const urlParams = new URLSearchParams(window.location.search);
            const source = urlParams.get('source');
            
            if (source === 'game' || source === 'trading') {
                redirectTo = source + '.html';
                localStorage.setItem('postAdRedirect', redirectTo);
            } else {
                // Fallback to checking localStorage or referrer
                const storedRedirect = localStorage.getItem('postAdRedirect');
                if (storedRedirect) {
                    redirectTo = storedRedirect;
                } else if (document.referrer.includes('game.html')) {
                    redirectTo = 'game.html';
                } else if (document.referrer.includes('trading.html')) {
                    redirectTo = 'trading.html';
                }
                localStorage.setItem('postAdRedirect', redirectTo);
            }

            // Load current progress
            const adData = JSON.parse(localStorage.getItem('adAccessData')) || {
                adsWatched: 0,
                accessGranted: false,
                expiryTime: 0
            };
            
            // Check if the 60-minute period has expired
            const now = Date.now();
            if (adData.expiryTime > 0 && now >= adData.expiryTime) {
                // Reset the ad count if expired
                currentAdCount = 0;
                localStorage.setItem('adAccessData', JSON.stringify({
                    adsWatched: 0,
                    accessGranted: false,
                    expiryTime: 0
                }));
            } else {
                currentAdCount = adData.adsWatched;
            }
            
            updateProgressDisplay();
            
            // Load first ad
            loadAd();
            
            // Setup button handler
            document.getElementById('watchAdBtn').addEventListener('click', handleAdWatch);
        });

        function updateProgressDisplay() {
            const remaining = totalAds - currentAdCount;
            const estimatedMinutes = Math.ceil((remaining * minAdDuration) / 60000);
            
            document.getElementById('adPurpose').textContent = 
                remaining > 0 ? `Watch ${remaining} more ads to continue` : 'All ads completed!';
            document.getElementById('completedCount').textContent = currentAdCount;
            document.getElementById('estimatedTime').textContent = 
                estimatedMinutes > 1 ? `${estimatedMinutes} minutes` : 'less than a minute';
            
            const container = document.getElementById('progressSteps');
            container.innerHTML = '';
            
            for (let i = 0; i < totalAds; i++) {
                const step = document.createElement('div');
                step.className = 'progress-step';
                step.textContent = i + 1;
                if (i < currentAdCount) {
                    step.classList.add('completed');
                    step.textContent = '';
                }
                if (i === currentAdCount) step.classList.add('active');
                container.appendChild(step);
            }
        }

        function loadAd() {
            canCountAd = false;
            adStartTime = Date.now();
            
            // Clear previous ad
            const adContainer = document.getElementById('adFrameContainer');
            adContainer.innerHTML = '';
            
            // Load new ad (your Adsterra code)
            const adScript1 = document.createElement('script');
            adScript1.type = 'text/javascript';
            adScript1.innerHTML = `
                atOptions = {
                    'key' : '8a1d6d42d6addf614a0b20c144270316',
                    'format' : 'iframe',
                    'height' : 250,
                    'width' : 300,
                    'params' : {}
                };
            `;

            const adScript2 = document.createElement('script');
            adScript2.type = 'text/javascript';
            adScript2.src = '//innumerablemakeupreligious.com/8a1d6d42d6addf614a0b20c144270316/invoke.js';

            adContainer.appendChild(adScript1);
            adContainer.appendChild(adScript2);
            
            // Start timer
            startTimer();
        }

        function startTimer() {
            let seconds = 15;
            updateTimerDisplay(seconds);
            
            clearInterval(timer);
            timer = setInterval(() => {
                seconds--;
                updateTimerDisplay(seconds);
                
                if (seconds <= 0) {
                    clearInterval(timer);
                    canCountAd = true;
                    document.getElementById('watchAdBtn').textContent = "Continue";
                    document.getElementById('watchAdBtn').style.backgroundColor = 'var(--success)';
                }
            }, 1000);
        }

        function updateTimerDisplay(seconds) {
            document.getElementById('timerCount').textContent = seconds;
            document.getElementById('timerCount').style.color = seconds <= 5 ? 'var(--danger)' : 'var(--primary)';
        }

        function handleAdWatch() {
            if (!canCountAd) {
                const elapsed = Date.now() - adStartTime;
                const remaining = Math.ceil((minAdDuration - elapsed) / 1000);
                alert(`Please watch the ad for ${remaining} more seconds before continuing.`);
                return;
            }
            
            // Count the ad
            currentAdCount++;
            
            // Set expiry time when completing all ads
            const expiryTime = currentAdCount >= totalAds ? Date.now() + resetInterval : 0;
            
            localStorage.setItem('adAccessData', JSON.stringify({
                adsWatched: currentAdCount,
                accessGranted: currentAdCount >= totalAds,
                expiryTime: expiryTime
            }));
            
            // Check if completed
            if (currentAdCount >= totalAds) {
                grantAccessAndRedirect();
                return;
            }
            
            // Update display and load next ad
            updateProgressDisplay();
            document.getElementById('watchAdBtn').textContent = "Watch Ad";
            document.getElementById('watchAdBtn').style.backgroundColor = 'var(--primary)';
            loadAd();
        }

        function grantAccessAndRedirect() {
            // Get redirect URL from localStorage
            const redirectUrl = localStorage.getItem('postAdRedirect') || 'game.html';
            
            // Clean up and redirect
            localStorage.removeItem('postAdRedirect');
            window.location.href = redirectUrl + '?ads_completed=true';
        }
    </script>
</body>
</html>
